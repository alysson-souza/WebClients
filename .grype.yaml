fail-on-severity: 'critical'
ignore:
    # Statuses
    - fix-state: not-fixed
    - fix-state: unknown
    - fix-state: wont-fix

    # Vulnerabilities
    # How to fix them:
    #  - remove the entry you aim to fix from the following list
    #  - check in the CI that is failing
    #  - patch/update the target dependency accordingly
    #  - the CI should be green and that's it

    ## Go
    # Safe to ignore: Go is not used in production. The only Go code in this repo is a
    # change set generation script and is never shipped or executed in a production environment.
    - package:
        type: go-module

    ## Npm
    - vulnerability: GHSA-phwq-j96m-2c2q
      package:
          name: ejs
          type: npm
          version: 2.7.4
    - vulnerability: GHSA-593f-38f6-jp5m
      package:
          name: koa
          type: npm
          version: 2.15.3
    - vulnerability: GHSA-76p3-8jx3-jpfq
      package:
          name: loader-utils
          type: npm
          version: 0.2.17
